<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="340" fill="#0d1117"/>
  <text x="450" y="34" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">cudaMalloc vs. Stream-Ordered Allocation</text>

  <text x="40" y="70" fill="#8b949e" font-size="13" font-weight="bold">Classic cudaMalloc / cudaFree — synchronizes the whole device</text>
  <g transform="translate(40,85)" font-size="11" fill="#e6edf3">
    <rect x="0"   y="0" width="90" height="30" rx="4" fill="#f85149" opacity="0.85"/><text x="45" y="19" text-anchor="middle">cudaMalloc</text>
    <rect x="100" y="0" width="120" height="30" rx="4" fill="#2ea043" opacity="0.85"/><text x="160" y="19" text-anchor="middle">kernel</text>
    <rect x="230" y="0" width="90" height="30" rx="4" fill="#f85149" opacity="0.85"/><text x="275" y="19" text-anchor="middle">cudaFree</text>
    <text x="420" y="19" fill="#8b949e">← both are implicit sync points, break stream concurrency</text>
  </g>

  <text x="40" y="160" fill="#8b949e" font-size="13" font-weight="bold">cudaMallocAsync / cudaFreeAsync — tied to a stream, no device-wide sync</text>
  <g transform="translate(40,175)" font-size="11" fill="#e6edf3">
    <rect x="0"   y="0" width="110" height="30" rx="4" fill="#2ea043" opacity="0.85"/><text x="55" y="19" text-anchor="middle">mallocAsync</text>
    <rect x="120" y="0" width="120" height="30" rx="4" fill="#2ea043" opacity="0.85"/><text x="180" y="19" text-anchor="middle">kernel</text>
    <rect x="250" y="0" width="100" height="30" rx="4" fill="#2ea043" opacity="0.85"/><text x="300" y="19" text-anchor="middle">freeAsync</text>
    <text x="420" y="19" fill="#8b949e">← all three ordered within the same stream, memory reused from a pool</text>
  </g>

  <text x="450" y="260" text-anchor="middle" fill="#8b949e" font-size="12">Because allocation is stream-ordered, it composes with everything else this course covered: overlap it with other streams (Day 6/7),</text>
  <text x="450" y="285" text-anchor="middle" fill="#8b949e" font-size="12">or capture it into a CUDA graph (Day 12) so allocate → compute → free becomes one replayable unit.</text>
</svg>
