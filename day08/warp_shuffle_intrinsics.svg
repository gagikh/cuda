<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="argreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3 z" fill="#2ea043"/></marker>
    <marker id="arblue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3 z" fill="#1f6feb"/></marker>
    <marker id="arpurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3 z" fill="#8957e5"/></marker>
    <marker id="arpurple-s" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M7,0 L7,6 L0,3 z" fill="#8957e5"/></marker>
  </defs>
  <rect width="900" height="260" fill="#0d1117"/>
  <text x="450" y="24" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Warp Shuffle Intrinsics — 8 lanes, one warp fragment</text>
  <text x="450" y="42" text-anchor="middle" fill="#8b949e" font-size="11">no shared memory, no __syncthreads() — lanes read each other's registers directly &#183; loops continuously</text>

  <!-- phase labels, one visible at a time -->
  <text x="450" y="66" text-anchor="middle" fill="#2ea043" font-size="13" font-weight="bold">
    __shfl_down_sync(mask, v, 1) &#8212; lane i reads from lane i+1
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.333;0.334;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="66" text-anchor="middle" fill="#1f6feb" font-size="13" font-weight="bold" opacity="0">
    __shfl_up_sync(mask, v, 1) &#8212; lane i reads from lane i-1
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.333;0.334;0.667;0.668;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="66" text-anchor="middle" fill="#8957e5" font-size="13" font-weight="bold" opacity="0">
    __shfl_xor_sync(mask, v, 1) &#8212; lane i swaps with lane i^1
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.667;0.668;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- down arrows (above lanes) -->
  <g fill="none" stroke="#2ea043" stroke-width="2" opacity="1">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.333;0.334;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
    <path d="M300,95 L240,95" marker-end="url(#argreen)"/>
    <path d="M360,95 L300,95" marker-end="url(#argreen)"/>
    <path d="M420,95 L360,95" marker-end="url(#argreen)"/>
    <path d="M480,95 L420,95" marker-end="url(#argreen)"/>
    <path d="M540,95 L480,95" marker-end="url(#argreen)"/>
    <path d="M600,95 L540,95" marker-end="url(#argreen)"/>
    <path d="M660,95 L600,95" marker-end="url(#argreen)"/>
  </g>

  <!-- lane boxes -->
  <g id="lanes" font-size="13" font-weight="bold" stroke="#2ea043" stroke-width="2">
    <animate attributeName="stroke" values="#2ea043;#2ea043;#1f6feb;#1f6feb;#8957e5;#8957e5" keyTimes="0;0.333;0.334;0.667;0.668;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
    <rect x="215" y="110" width="50" height="50" rx="6" fill="#21262d"/>
    <rect x="275" y="110" width="50" height="50" rx="6" fill="#21262d"/>
    <rect x="335" y="110" width="50" height="50" rx="6" fill="#21262d"/>
    <rect x="395" y="110" width="50" height="50" rx="6" fill="#21262d"/>
    <rect x="455" y="110" width="50" height="50" rx="6" fill="#21262d"/>
    <rect x="515" y="110" width="50" height="50" rx="6" fill="#21262d"/>
    <rect x="575" y="110" width="50" height="50" rx="6" fill="#21262d"/>
    <rect x="635" y="110" width="50" height="50" rx="6" fill="#21262d"/>
  </g>
  <g font-size="13" fill="#e6edf3" text-anchor="middle">
    <text x="240" y="140">10</text>
    <text x="300" y="140">20</text>
    <text x="360" y="140">30</text>
    <text x="420" y="140">40</text>
    <text x="480" y="140">50</text>
    <text x="540" y="140">60</text>
    <text x="600" y="140">70</text>
    <text x="660" y="140">80</text>
  </g>
  <g font-size="10" fill="#8b949e" text-anchor="middle">
    <text x="240" y="178">L0</text>
    <text x="300" y="178">L1</text>
    <text x="360" y="178">L2</text>
    <text x="420" y="178">L3</text>
    <text x="480" y="178">L4</text>
    <text x="540" y="178">L5</text>
    <text x="600" y="178">L6</text>
    <text x="660" y="178">L7</text>
  </g>

  <!-- up arrows (below lanes) -->
  <g fill="none" stroke="#1f6feb" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.333;0.334;0.667;0.668;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
    <path d="M240,195 L300,195" marker-end="url(#arblue)"/>
    <path d="M300,195 L360,195" marker-end="url(#arblue)"/>
    <path d="M360,195 L420,195" marker-end="url(#arblue)"/>
    <path d="M420,195 L480,195" marker-end="url(#arblue)"/>
    <path d="M480,195 L540,195" marker-end="url(#arblue)"/>
    <path d="M540,195 L600,195" marker-end="url(#arblue)"/>
    <path d="M600,195 L660,195" marker-end="url(#arblue)"/>
  </g>

  <!-- xor double-headed arcs (above lanes, higher arch) -->
  <g fill="none" stroke="#8957e5" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.667;0.668;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
    <path d="M240,95 Q270,60 300,95" marker-start="url(#arpurple-s)" marker-end="url(#arpurple)"/>
    <path d="M360,95 Q390,60 420,95" marker-start="url(#arpurple-s)" marker-end="url(#arpurple)"/>
    <path d="M480,95 Q510,60 540,95" marker-start="url(#arpurple-s)" marker-end="url(#arpurple)"/>
    <path d="M600,95 Q630,60 660,95" marker-start="url(#arpurple-s)" marker-end="url(#arpurple)"/>
  </g>

  <text x="450" y="240" text-anchor="middle" fill="#8b949e" font-size="10">All three read another lane's register in one instruction — the building block for warp reductions (Day 8) and scans.</text>
</svg>
