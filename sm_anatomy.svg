<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="1000" height="720" fill="#0d1117"/>
  <text x="500" y="32" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">Inside One Streaming Multiprocessor (SM)</text>
  <text x="500" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Generic layout — exact unit counts vary by architecture; get yours from report_device_capabilities()</text>

  <!-- SM outer box -->
  <rect x="30" y="70" width="940" height="470" rx="10" fill="#161b22" stroke="#8957e5" stroke-width="2"/>
  <text x="50" y="95" fill="#8957e5" font-size="14" font-weight="bold">SM</text>

  <!-- Instruction cache -->
  <rect x="60" y="105" width="880" height="34" rx="6" fill="#21262d" stroke="#8b949e"/>
  <text x="500" y="127" text-anchor="middle" fill="#e6edf3" font-size="12">Instruction Cache (L0/L1 I-Cache) — this is where the SASS code for your kernel lives while it runs</text>

  <!-- 4 partitions -->
  <g font-size="10">
    <!-- partition template repeated x4 -->
    <g transform="translate(60,155)">
      <rect x="0" y="0" width="205" height="230" rx="6" fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
      <text x="102" y="18" text-anchor="middle" fill="#1f6feb" font-size="11" font-weight="bold">Partition 0</text>
      <rect x="10" y="26" width="185" height="24" rx="4" fill="#2ea043" opacity="0.85"/>
      <text x="102" y="42" text-anchor="middle" fill="#0d1117" font-size="10">Warp Scheduler + Dispatch</text>
      <rect x="10" y="56" width="185" height="30" rx="4" fill="#f0883e" opacity="0.85"/>
      <text x="102" y="76" text-anchor="middle" fill="#0d1117" font-size="10">Register File (segment)</text>
      <rect x="10" y="92" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="53" y="110" text-anchor="middle" fill="#0d1117" font-size="9">INT32 ALUs</text>
      <rect x="109" y="92" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="152" y="110" text-anchor="middle" fill="#0d1117" font-size="9">FP32 units</text>
      <rect x="10" y="124" width="86" height="28" rx="4" fill="#f85149" opacity="0.6"/>
      <text x="53" y="142" text-anchor="middle" fill="#0d1117" font-size="9">FP64 units (few)</text>
      <rect x="109" y="124" width="86" height="28" rx="4" fill="#f85149" opacity="0.6"/>
      <text x="152" y="142" text-anchor="middle" fill="#0d1117" font-size="9">SFU</text>
      <rect x="10" y="156" width="86" height="28" rx="4" fill="#8957e5" opacity="0.7"/>
      <text x="53" y="174" text-anchor="middle" fill="#e6edf3" font-size="9">Tensor Core</text>
      <rect x="109" y="156" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="152" y="174" text-anchor="middle" fill="#0d1117" font-size="9">LD/ST units</text>
      <text x="102" y="200" text-anchor="middle" fill="#8b949e" font-size="9">32 threads (1 warp)</text>
      <text x="102" y="214" text-anchor="middle" fill="#8b949e" font-size="9">issued per cycle, in lockstep</text>
    </g>
    <g transform="translate(275,155)">
      <rect x="0" y="0" width="205" height="230" rx="6" fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
      <text x="102" y="18" text-anchor="middle" fill="#1f6feb" font-size="11" font-weight="bold">Partition 1</text>
      <rect x="10" y="26" width="185" height="24" rx="4" fill="#2ea043" opacity="0.85"/>
      <text x="102" y="42" text-anchor="middle" fill="#0d1117" font-size="10">Warp Scheduler + Dispatch</text>
      <rect x="10" y="56" width="185" height="30" rx="4" fill="#f0883e" opacity="0.85"/>
      <text x="102" y="76" text-anchor="middle" fill="#0d1117" font-size="10">Register File (segment)</text>
      <rect x="10" y="92" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="53" y="110" text-anchor="middle" fill="#0d1117" font-size="9">INT32 ALUs</text>
      <rect x="109" y="92" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="152" y="110" text-anchor="middle" fill="#0d1117" font-size="9">FP32 units</text>
      <rect x="10" y="124" width="86" height="28" rx="4" fill="#f85149" opacity="0.6"/>
      <text x="53" y="142" text-anchor="middle" fill="#0d1117" font-size="9">FP64 units (few)</text>
      <rect x="109" y="124" width="86" height="28" rx="4" fill="#f85149" opacity="0.6"/>
      <text x="152" y="142" text-anchor="middle" fill="#0d1117" font-size="9">SFU</text>
      <rect x="10" y="156" width="86" height="28" rx="4" fill="#8957e5" opacity="0.7"/>
      <text x="53" y="174" text-anchor="middle" fill="#e6edf3" font-size="9">Tensor Core</text>
      <rect x="109" y="156" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="152" y="174" text-anchor="middle" fill="#0d1117" font-size="9">LD/ST units</text>
      <text x="102" y="200" text-anchor="middle" fill="#8b949e" font-size="9">32 threads (1 warp)</text>
      <text x="102" y="214" text-anchor="middle" fill="#8b949e" font-size="9">issued per cycle, in lockstep</text>
    </g>
    <g transform="translate(490,155)">
      <rect x="0" y="0" width="205" height="230" rx="6" fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
      <text x="102" y="18" text-anchor="middle" fill="#1f6feb" font-size="11" font-weight="bold">Partition 2</text>
      <rect x="10" y="26" width="185" height="24" rx="4" fill="#2ea043" opacity="0.85"/>
      <text x="102" y="42" text-anchor="middle" fill="#0d1117" font-size="10">Warp Scheduler + Dispatch</text>
      <rect x="10" y="56" width="185" height="30" rx="4" fill="#f0883e" opacity="0.85"/>
      <text x="102" y="76" text-anchor="middle" fill="#0d1117" font-size="10">Register File (segment)</text>
      <rect x="10" y="92" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="53" y="110" text-anchor="middle" fill="#0d1117" font-size="9">INT32 ALUs</text>
      <rect x="109" y="92" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="152" y="110" text-anchor="middle" fill="#0d1117" font-size="9">FP32 units</text>
      <rect x="10" y="124" width="86" height="28" rx="4" fill="#f85149" opacity="0.6"/>
      <text x="53" y="142" text-anchor="middle" fill="#0d1117" font-size="9">FP64 units (few)</text>
      <rect x="109" y="124" width="86" height="28" rx="4" fill="#f85149" opacity="0.6"/>
      <text x="152" y="142" text-anchor="middle" fill="#0d1117" font-size="9">SFU</text>
      <rect x="10" y="156" width="86" height="28" rx="4" fill="#8957e5" opacity="0.7"/>
      <text x="53" y="174" text-anchor="middle" fill="#e6edf3" font-size="9">Tensor Core</text>
      <rect x="109" y="156" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="152" y="174" text-anchor="middle" fill="#0d1117" font-size="9">LD/ST units</text>
      <text x="102" y="200" text-anchor="middle" fill="#8b949e" font-size="9">32 threads (1 warp)</text>
      <text x="102" y="214" text-anchor="middle" fill="#8b949e" font-size="9">issued per cycle, in lockstep</text>
    </g>
    <g transform="translate(705,155)">
      <rect x="0" y="0" width="205" height="230" rx="6" fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
      <text x="102" y="18" text-anchor="middle" fill="#1f6feb" font-size="11" font-weight="bold">Partition 3</text>
      <rect x="10" y="26" width="185" height="24" rx="4" fill="#2ea043" opacity="0.85"/>
      <text x="102" y="42" text-anchor="middle" fill="#0d1117" font-size="10">Warp Scheduler + Dispatch</text>
      <rect x="10" y="56" width="185" height="30" rx="4" fill="#f0883e" opacity="0.85"/>
      <text x="102" y="76" text-anchor="middle" fill="#0d1117" font-size="10">Register File (segment)</text>
      <rect x="10" y="92" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="53" y="110" text-anchor="middle" fill="#0d1117" font-size="9">INT32 ALUs</text>
      <rect x="109" y="92" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="152" y="110" text-anchor="middle" fill="#0d1117" font-size="9">FP32 units</text>
      <rect x="10" y="124" width="86" height="28" rx="4" fill="#f85149" opacity="0.6"/>
      <text x="53" y="142" text-anchor="middle" fill="#0d1117" font-size="9">FP64 units (few)</text>
      <rect x="109" y="124" width="86" height="28" rx="4" fill="#f85149" opacity="0.6"/>
      <text x="152" y="142" text-anchor="middle" fill="#0d1117" font-size="9">SFU</text>
      <rect x="10" y="156" width="86" height="28" rx="4" fill="#8957e5" opacity="0.7"/>
      <text x="53" y="174" text-anchor="middle" fill="#e6edf3" font-size="9">Tensor Core</text>
      <rect x="109" y="156" width="86" height="28" rx="4" fill="#8b949e" opacity="0.5"/>
      <text x="152" y="174" text-anchor="middle" fill="#0d1117" font-size="9">LD/ST units</text>
      <text x="102" y="200" text-anchor="middle" fill="#8b949e" font-size="9">32 threads (1 warp)</text>
      <text x="102" y="214" text-anchor="middle" fill="#8b949e" font-size="9">issued per cycle, in lockstep</text>
    </g>
  </g>

  <!-- Shared memory / L1 + constant cache, spanning all partitions -->
  <rect x="60" y="400" width="565" height="50" rx="6" fill="#2ea043" opacity="0.3" stroke="#2ea043"/>
  <text x="342" y="422" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Shared Memory / L1 Data Cache</text>
  <text x="342" y="440" text-anchor="middle" fill="#8b949e" font-size="10">one on-chip SRAM pool, split between explicit shared memory and automatic L1 caching (configurable)</text>

  <rect x="635" y="400" width="305" height="50" rx="6" fill="#f0883e" opacity="0.3" stroke="#f0883e"/>
  <text x="787" y="422" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Constant Cache</text>
  <text x="787" y="440" text-anchor="middle" fill="#8b949e" font-size="10">backs __constant__ memory and kernel parameters</text>

  <text x="500" y="480" text-anchor="middle" fill="#8b949e" font-size="11">Multiple blocks can be resident on one SM at once, sharing all of the above — how many fit is what "occupancy" means.</text>
  <text x="500" y="500" text-anchor="middle" fill="#8b949e" font-size="11">All numbers above (register file size, shared mem size, warp schedulers, ...) are per-SM; multiply by SM count for chip totals.</text>

  <!-- Below SM: L2 + Global memory, chip-wide -->
  <path d="M500 540 v25" stroke="#8b949e" stroke-width="2" marker-end="url(#a10)"/>

  <rect x="200" y="570" width="600" height="60" rx="8" fill="#161b22" stroke="#f85149" stroke-width="2"/>
  <text x="500" y="595" text-anchor="middle" fill="#f85149" font-size="14" font-weight="bold">L2 Cache — shared by ALL SMs on the chip</text>
  <text x="500" y="615" text-anchor="middle" fill="#8b949e" font-size="11">includes dedicated ALUs for atomic read-modify-write ops — atomics resolve here, not back at the SM</text>

  <path d="M500 630 v25" stroke="#8b949e" stroke-width="2" marker-end="url(#a10)"/>

  <rect x="250" y="660" width="500" height="45" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="2"/>
  <text x="500" y="688" text-anchor="middle" fill="#e6edf3" font-size="13">Global Memory (VRAM / DRAM) — off-chip, largest, slowest, visible to every SM</text>

  <defs>
    <marker id="a10" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#8b949e"/></marker>
  </defs>
</svg>
