<svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="360" fill="#0d1117"/>
  <text x="450" y="34" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">Tiled Matrix Multiplication</text>

  <!-- Matrix A -->
  <text x="120" y="70" text-anchor="middle" fill="#1f6feb" font-size="13" font-weight="bold">A</text>
  <rect x="40" y="80" width="160" height="200" fill="#161b22" stroke="#8b949e"/>
  <rect x="40" y="140" width="160" height="40" fill="#1f6feb" opacity="0.8"/>
  <text x="120" y="164" text-anchor="middle" fill="#e6edf3" font-size="11">row tile</text>

  <text x="240" y="60" fill="#8b949e" font-size="20">×</text>

  <!-- Matrix B -->
  <text x="330" y="70" text-anchor="middle" fill="#2ea043" font-size="13" font-weight="bold">B</text>
  <rect x="260" y="80" width="140" height="200" fill="#161b22" stroke="#8b949e"/>
  <rect x="300" y="80" width="40" height="200" fill="#2ea043" opacity="0.8"/>
  <text x="320" y="190" text-anchor="middle" fill="#e6edf3" font-size="11" transform="rotate(-90 320 190)">col tile</text>

  <text x="435" y="185" fill="#8b949e" font-size="20">=</text>

  <!-- Matrix C -->
  <text x="590" y="70" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold">C</text>
  <rect x="470" y="80" width="240" height="200" fill="#161b22" stroke="#8b949e"/>
  <rect x="590" y="140" width="40" height="40" fill="#f0883e" opacity="0.9"/>
  <text x="610" y="230" text-anchor="middle" fill="#e6edf3" font-size="11">1 output tile</text>

  <!-- shared mem box -->
  <rect x="740" y="120" width="130" height="120" rx="8" fill="#8957e5" opacity="0.25" stroke="#8957e5"/>
  <text x="805" y="145" text-anchor="middle" fill="#8957e5" font-size="12" font-weight="bold">shared mem</text>
  <text x="805" y="165" text-anchor="middle" fill="#8b949e" font-size="10">As[TILE][TILE]</text>
  <text x="805" y="180" text-anchor="middle" fill="#8b949e" font-size="10">Bs[TILE][TILE]</text>
  <text x="805" y="205" text-anchor="middle" fill="#8b949e" font-size="10">loaded once,</text>
  <text x="805" y="220" text-anchor="middle" fill="#8b949e" font-size="10">reused by whole block</text>

  <path d="M470 180 H740" stroke="#8957e5" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#a7)"/>

  <text x="450" y="320" text-anchor="middle" fill="#8b949e" font-size="12">Naive version re-reads A and B from global memory for every element of C.</text>
  <text x="450" y="342" text-anchor="middle" fill="#8b949e" font-size="12">Tiled version: each block loads one A-tile and one B-tile into shared memory once, then every thread in the block reuses them — far fewer global reads.</text>

  <defs>
    <marker id="a7" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#8957e5"/></marker>
  </defs>
</svg>
