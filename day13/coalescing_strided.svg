<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="220" fill="#0d1117"/>
  <text x="450" y="24" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Coalesced vs Strided Global Memory Access</text>
  <text x="450" y="42" text-anchor="middle" fill="#8b949e" font-size="11">same 32 threads, same 128 bytes of data, two access patterns &#183; loops continuously</text>

  <!-- LEFT: coalesced -->
  <text x="230" y="70" text-anchor="middle" fill="#2ea043" font-size="13" font-weight="bold">Coalesced</text>
  <text x="230" y="86" text-anchor="middle" fill="#8b949e" font-size="10">thread i reads base + i &#8594; one 128B line</text>
  <rect x="120" y="140" width="220" height="34" rx="6" fill="#21262d" stroke="#8b949e" stroke-width="2">
    <animate attributeName="stroke" values="#8b949e;#2ea043;#8b949e;#8b949e" keyTimes="0;0.02;0.06;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="2;2;5;2;2" keyTimes="0;0.02;0.04;0.06;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="230" y="162" text-anchor="middle" fill="#e6edf3" font-size="12">1 memory transaction</text>

  <!-- RIGHT: strided -->
  <text x="670" y="70" text-anchor="middle" fill="#f85149" font-size="13" font-weight="bold">Strided</text>
  <text x="670" y="86" text-anchor="middle" fill="#8b949e" font-size="10">thread i reads base + i&#215;32 &#8594; 32 separate lines</text>
