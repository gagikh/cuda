  <text x="230" y="410" text-anchor="middle" fill="#f85149" font-size="12" font-weight="bold">All 8 accesses hit bank 3 → 8-way conflict</text>

  <!-- RIGHT: swizzled -->
  <text x="770" y="85" text-anchor="middle" fill="#2ea043" font-size="14" font-weight="bold">smem[row][col ^ row] — swizzled</text>
  <text x="770" y="103" text-anchor="middle" fill="#8b949e" font-size="11">physical bank = (col ^ row) mod 8 → changes with row</text>

