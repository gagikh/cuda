  <text x="770" y="410" text-anchor="middle" fill="#2ea043" font-size="12" font-weight="bold">Every access lands on a different bank (b3,b2,b1,b0,b7,b6,b5,b4) → conflict-free</text>

  <text x="500" y="450" text-anchor="middle" fill="#8b949e" font-size="12" font-family="monospace">write: tile[row][col ^ row] = value;   read: value = tile[row][col ^ row];</text>
  <text x="500" y="470" text-anchor="middle" fill="#8b949e" font-size="11">Same [TILE][TILE] storage as the unpadded array — no wasted TILE+1'th column, unlike the padding fix from Day 5.</text>
