<svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="1000" height="480" fill="#0d1117"/>
  <text x="500" y="32" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">Bank-Conflict-Free Shared Memory Without Padding: col ^ row</text>
  <text x="500" y="53" text-anchor="middle" fill="#8b949e" font-size="12">8×8 tile shown (same idea scales to 32×32, one bank per column); logical column j=3 highlighted in both grids</text>

  <!-- LEFT: naive -->
  <text x="230" y="85" text-anchor="middle" fill="#f85149" font-size="14" font-weight="bold">smem[row][col] — no swizzle</text>
  <text x="230" y="103" text-anchor="middle" fill="#8b949e" font-size="11">physical bank = col mod 8 → constant for a fixed column</text>

  <g transform="translate(70,115)">
    <!-- 8x8 grid, cell 36x36 -->
    <!-- draw all cells, highlight col index 3 -->
    <g id="left-grid">
      <!-- rows 0..7, cols 0..7 -->
    </g>
    <!-- background cells -->
    <g fill="#161b22" stroke="#21262d">
      <!-- generate via manual repetition -->
    </g>
  </g>

