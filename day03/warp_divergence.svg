<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="220" fill="#0d1117"/>
  <text x="450" y="26" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Warp Divergence — if (tid &lt; 16) A(); else B();</text>
  <text x="450" y="44" text-anchor="middle" fill="#8b949e" font-size="11">one 32-thread warp; loops continuously</text>

  <!-- 32 thread squares: left half (0-15), right half (16-31) -->
  <g id="left" fill="#2ea043">
    <animate attributeName="fill" values="#2ea043;#30363d;#2ea043;#2ea043" keyTimes="0;0.225;0.45;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.35;1;1" keyTimes="0;0.225;0.45;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
    <rect x="163" y="90" width="16" height="16" rx="2"/>
    <rect x="181" y="90" width="16" height="16" rx="2"/>
    <rect x="199" y="90" width="16" height="16" rx="2"/>
    <rect x="217" y="90" width="16" height="16" rx="2"/>
    <rect x="235" y="90" width="16" height="16" rx="2"/>
    <rect x="253" y="90" width="16" height="16" rx="2"/>
    <rect x="271" y="90" width="16" height="16" rx="2"/>
    <rect x="289" y="90" width="16" height="16" rx="2"/>
    <rect x="307" y="90" width="16" height="16" rx="2"/>
    <rect x="325" y="90" width="16" height="16" rx="2"/>
    <rect x="343" y="90" width="16" height="16" rx="2"/>
    <rect x="361" y="90" width="16" height="16" rx="2"/>
    <rect x="379" y="90" width="16" height="16" rx="2"/>
    <rect x="397" y="90" width="16" height="16" rx="2"/>
    <rect x="415" y="90" width="16" height="16" rx="2"/>
    <rect x="433" y="90" width="16" height="16" rx="2"/>
  </g>
  <g id="right" fill="#2ea043" opacity="0.35">
    <animate attributeName="fill" values="#30363d;#2ea043;#2ea043;#30363d" keyTimes="0;0.225;0.45;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;1;1;0.35" keyTimes="0;0.225;0.45;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
    <rect x="451" y="90" width="16" height="16" rx="2"/>
    <rect x="469" y="90" width="16" height="16" rx="2"/>
    <rect x="487" y="90" width="16" height="16" rx="2"/>
    <rect x="505" y="90" width="16" height="16" rx="2"/>
    <rect x="523" y="90" width="16" height="16" rx="2"/>
    <rect x="541" y="90" width="16" height="16" rx="2"/>
    <rect x="559" y="90" width="16" height="16" rx="2"/>
    <rect x="577" y="90" width="16" height="16" rx="2"/>
    <rect x="595" y="90" width="16" height="16" rx="2"/>
    <rect x="613" y="90" width="16" height="16" rx="2"/>
    <rect x="631" y="90" width="16" height="16" rx="2"/>
    <rect x="649" y="90" width="16" height="16" rx="2"/>
    <rect x="667" y="90" width="16" height="16" rx="2"/>
    <rect x="685" y="90" width="16" height="16" rx="2"/>
    <rect x="703" y="90" width="16" height="16" rx="2"/>
    <rect x="721" y="90" width="16" height="16" rx="2"/>
  </g>

  <!-- status text, one visible at a time -->
  <text x="450" y="150" text-anchor="middle" fill="#c9a6ff" font-size="13" opacity="1">
    Cycle 1-2: threads 0-15 active (path A), 16-31 masked off
    <animate attributeName="opacity" values="1;0;0" keyTimes="0;0.225;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="150" text-anchor="middle" fill="#c9a6ff" font-size="13" opacity="0">
    Cycle 3-4: threads 16-31 active (path B), 0-15 masked off
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.225;0.45" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="150" text-anchor="middle" fill="#c9a6ff" font-size="13" opacity="0">
    Cycle 5: reconverged — all 32 threads active again
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.45;0.99;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
  </text>

  <text x="450" y="185" text-anchor="middle" fill="#8b949e" font-size="11">Total: ~5 cycles for this divergent warp vs ~3 if all 32 threads had agreed on the branch.</text>
</svg>
