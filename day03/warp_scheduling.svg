<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="260" fill="#0d1117"/>
  <text x="450" y="28" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Warp Scheduling — one partition, 6 resident warps</text>
  <text x="450" y="46" text-anchor="middle" fill="#8b949e" font-size="11">loops continuously — watch how a new warp is always ready to issue</text>

  <!-- warp chips -->
  <g font-size="12" font-weight="bold">
    <rect x="20" y="90" width="70" height="60" rx="6" fill="#1f6feb" opacity="1">
      <animate attributeName="opacity" values="1;0.35;0.35;1" keyTimes="0;0.05;0.95;1" dur="3.2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="55" y="124" text-anchor="middle" fill="#0d1117">W0</text>

    <rect x="110" y="90" width="70" height="60" rx="6" fill="#1f6feb" opacity="0.35">
      <animate attributeName="opacity" values="1;0.35;0.35;1" keyTimes="0;0.05;0.95;1" dur="3.2s" begin="0.53s" repeatCount="indefinite"/>
    </rect>
    <text x="145" y="124" text-anchor="middle" fill="#0d1117">W1</text>

    <rect x="200" y="90" width="70" height="60" rx="6" fill="#1f6feb" opacity="0.35">
      <animate attributeName="opacity" values="1;0.35;0.35;1" keyTimes="0;0.05;0.95;1" dur="3.2s" begin="1.06s" repeatCount="indefinite"/>
    </rect>
    <text x="235" y="124" text-anchor="middle" fill="#0d1117">W2</text>

    <rect x="290" y="90" width="70" height="60" rx="6" fill="#1f6feb" opacity="0.35">
      <animate attributeName="opacity" values="1;0.35;0.35;1" keyTimes="0;0.05;0.95;1" dur="3.2s" begin="1.59s" repeatCount="indefinite"/>
    </rect>
    <text x="325" y="124" text-anchor="middle" fill="#0d1117">W3</text>

    <rect x="20" y="160" width="70" height="60" rx="6" fill="#1f6feb" opacity="0.35">
      <animate attributeName="opacity" values="1;0.35;0.35;1" keyTimes="0;0.05;0.95;1" dur="3.2s" begin="2.12s" repeatCount="indefinite"/>
    </rect>
    <text x="55" y="194" text-anchor="middle" fill="#0d1117">W4</text>

    <rect x="110" y="160" width="70" height="60" rx="6" fill="#1f6feb" opacity="0.35">
      <animate attributeName="opacity" values="1;0.35;0.35;1" keyTimes="0;0.05;0.95;1" dur="3.2s" begin="2.65s" repeatCount="indefinite"/>
    </rect>
    <text x="145" y="194" text-anchor="middle" fill="#0d1117">W5</text>
  </g>
  <text x="190" y="240" text-anchor="middle" fill="#8b949e" font-size="10">resident warps (queued)</text>

  <text x="420" y="130" text-anchor="middle" fill="#8b949e" font-size="20">&#8594;</text>

  <!-- scheduler -->
  <rect x="460" y="95" width="150" height="50" rx="6" fill="#2ea043" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  <text x="535" y="125" text-anchor="middle" fill="#0d1117" font-size="12" font-weight="bold">Warp Scheduler</text>

  <text x="640" y="130" text-anchor="middle" fill="#8b949e" font-size="20">&#8594;</text>

  <!-- execution units -->
  <rect x="680" y="95" width="180" height="50" rx="6" fill="#f0883e" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" begin="0.2s" repeatCount="indefinite"/>
  </rect>
  <text x="770" y="125" text-anchor="middle" fill="#0d1117" font-size="12" font-weight="bold">Execution Units</text>

  <!-- traveling dots: one per warp -->
  <circle r="7" fill="#e6edf3" stroke="#8957e5" stroke-width="2" opacity="0">
    <animateMotion path="M55,120 L535,120 L770,120" dur="3.2s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="3.2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="7" fill="#e6edf3" stroke="#8957e5" stroke-width="2" opacity="0">
    <animateMotion path="M145,120 L535,120 L770,120" dur="3.2s" begin="0.53s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="3.2s" begin="0.53s" repeatCount="indefinite"/>
  </circle>
  <circle r="7" fill="#e6edf3" stroke="#8957e5" stroke-width="2" opacity="0">
    <animateMotion path="M235,120 L535,120 L770,120" dur="3.2s" begin="1.06s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="3.2s" begin="1.06s" repeatCount="indefinite"/>
  </circle>
  <circle r="7" fill="#e6edf3" stroke="#8957e5" stroke-width="2" opacity="0">
    <animateMotion path="M325,120 L535,120 L770,120" dur="3.2s" begin="1.59s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="3.2s" begin="1.59s" repeatCount="indefinite"/>
  </circle>
  <circle r="7" fill="#e6edf3" stroke="#8957e5" stroke-width="2" opacity="0">
    <animateMotion path="M55,190 L535,145 L770,120" dur="3.2s" begin="2.12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="3.2s" begin="2.12s" repeatCount="indefinite"/>
  </circle>
  <circle r="7" fill="#e6edf3" stroke="#8957e5" stroke-width="2" opacity="0">
    <animateMotion path="M145,190 L535,145 L770,120" dur="3.2s" begin="2.65s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="3.2s" begin="2.65s" repeatCount="indefinite"/>
  </circle>
</svg>
