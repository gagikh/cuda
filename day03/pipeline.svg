<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="420" fill="#0d1117"/>
  <text x="450" y="36" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">SIMT Instruction Pipeline — One Warp (32 Threads)</text>

  <!-- Pipeline stages -->
  <g font-size="14" fill="#e6edf3">
    <rect x="30" y="80" width="140" height="60" rx="8" fill="#1f6feb" opacity="0.85"/>
    <text x="100" y="115" text-anchor="middle" font-weight="bold">Fetch</text>

    <rect x="210" y="80" width="140" height="60" rx="8" fill="#1f6feb" opacity="0.85"/>
    <text x="280" y="115" text-anchor="middle" font-weight="bold">Decode</text>

    <rect x="390" y="80" width="160" height="60" rx="8" fill="#8957e5" opacity="0.9"/>
    <text x="470" y="110" text-anchor="middle" font-weight="bold">Warp Scheduler</text>
    <text x="470" y="128" text-anchor="middle" font-size="11">picks a ready warp</text>

    <rect x="590" y="80" width="280" height="60" rx="8" fill="#2ea043" opacity="0.9"/>
    <text x="730" y="110" text-anchor="middle" font-weight="bold">Issue same instruction</text>
    <text x="730" y="128" text-anchor="middle" font-size="11">to all 32 lanes (SIMT lockstep)</text>

    <!-- arrows -->
    <path d="M170 110 H210" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M350 110 H390" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M550 110 H590" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- 32 lanes -->
  <text x="450" y="185" text-anchor="middle" fill="#e6edf3" font-size="13">32 execution lanes execute the instruction simultaneously</text>
  <g>
    <!-- 4 rows x 8 lanes = 32 -->
    <g id="lanes"></g>
  </g>
  <g fill="#f0883e">
    <!-- generated grid of 32 small squares -->
  </g>
  <g>
    <!-- row 1 -->
    <g transform="translate(60,205)">
      <rect x="0"  y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="32" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="64" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="96" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="128" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="160" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="192" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="224" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
    </g>
    <g transform="translate(60,237)">
      <rect x="0"  y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="32" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="64" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="96" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="128" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="160" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="192" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="224" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
    </g>
    <g transform="translate(60,269)">
      <rect x="0"  y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="32" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="64" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="96" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="128" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="160" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="192" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="224" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
    </g>
    <g transform="translate(60,301)">
      <rect x="0"  y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="32" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="64" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="96" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="128" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="160" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="192" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
      <rect x="224" y="0" width="24" height="24" rx="4" fill="#f0883e"/>
    </g>
  </g>

  <text x="450" y="355" text-anchor="middle" fill="#8b949e" font-size="12">If threads in the warp take different branches (divergence), lanes are masked off and re-run per branch — see "Divergence" below.</text>
  <text x="450" y="378" text-anchor="middle" fill="#8b949e" font-size="12">This is why control flow inside a warp has a direct performance cost.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
