<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="300" fill="#0d1117"/>
  <text x="450" y="24" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Global Index = blockIdx.x * blockDim.x + threadIdx.x</text>
  <text x="450" y="42" text-anchor="middle" fill="#8b949e" font-size="11">blockDim.x = 4 &#183; loops through a few threads across 3 blocks</text>

  <!-- Block 0 -->
  <rect x="60" y="70" width="220" height="110" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="2"/>
  <text x="170" y="90" text-anchor="middle" fill="#1f6feb" font-size="12" font-weight="bold">Block 0</text>
  <rect x="78" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35" id="c0"/>
  <rect x="126" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35"/>
  <rect x="174" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35"/>
  <rect x="222" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35" id="c3"/>
  <text x="170" y="163" text-anchor="middle" fill="#8b949e" font-size="10">threadIdx.x = 0,1,2,3</text>

  <!-- Block 1 -->
  <rect x="340" y="70" width="220" height="110" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="2"/>
  <text x="450" y="90" text-anchor="middle" fill="#1f6feb" font-size="12" font-weight="bold">Block 1</text>
  <rect x="358" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35"/>
  <rect x="406" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35"/>
  <rect x="454" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35" id="c6"/>
  <rect x="502" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35"/>
  <text x="450" y="163" text-anchor="middle" fill="#8b949e" font-size="10">threadIdx.x = 0,1,2,3</text>

  <!-- Block 2 -->
  <rect x="620" y="70" width="220" height="110" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="2"/>
  <text x="730" y="90" text-anchor="middle" fill="#1f6feb" font-size="12" font-weight="bold">Block 2</text>
  <rect x="638" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35"/>
  <rect x="686" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35" id="c9"/>
  <rect x="734" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35"/>
  <rect x="782" y="105" width="40" height="40" rx="4" fill="#f0883e" opacity="0.35"/>
  <text x="730" y="163" text-anchor="middle" fill="#8b949e" font-size="10">threadIdx.x = 0,1,2,3</text>

  <!-- highlight animations, one demo cell active per quarter -->
  <rect x="78" y="105" width="40" height="40" rx="4" fill="none" stroke="#2ea043" stroke-width="0">
    <animate attributeName="stroke-width" values="0;4;4;0;0;0;0;0;0" keyTimes="0;0.01;0.24;0.25;0.49;0.5;0.74;0.75;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
  </rect>
  <rect x="222" y="105" width="40" height="40" rx="4" fill="none" stroke="#f85149" stroke-width="0">
    <animate attributeName="stroke-width" values="0;0;0;0;0;0;0;4;4" keyTimes="0;0.24;0.25;0.49;0.5;0.74;0.75;0.751;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
  </rect>
  <rect x="454" y="105" width="40" height="40" rx="4" fill="none" stroke="#2ea043" stroke-width="0">
    <animate attributeName="stroke-width" values="0;0;0;4;4;0;0;0;0" keyTimes="0;0.24;0.25;0.251;0.49;0.5;0.74;0.75;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
  </rect>
  <rect x="686" y="105" width="40" height="40" rx="4" fill="none" stroke="#2ea043" stroke-width="0">
    <animate attributeName="stroke-width" values="0;0;0;0;0;4;4;0;0" keyTimes="0;0.24;0.25;0.49;0.5;0.501;0.74;0.75;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- formula banner, 4 phases -->
  <text x="450" y="220" text-anchor="middle" fill="#c9a6ff" font-size="14" font-weight="bold">
    blockIdx.x(0) &#215; blockDim.x(4) + threadIdx.x(0) = 0
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.25;0.251;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="220" text-anchor="middle" fill="#c9a6ff" font-size="14" font-weight="bold" opacity="0">
    blockIdx.x(1) &#215; blockDim.x(4) + threadIdx.x(2) = 6
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.251;0.5;0.501;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="220" text-anchor="middle" fill="#c9a6ff" font-size="14" font-weight="bold" opacity="0">
    blockIdx.x(2) &#215; blockDim.x(4) + threadIdx.x(1) = 9
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.501;0.75;0.751;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
  </text>
  <text x="450" y="220" text-anchor="middle" fill="#c9a6ff" font-size="14" font-weight="bold" opacity="0">
    blockIdx.x(0) &#215; blockDim.x(4) + threadIdx.x(3) = 3
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.75;0.751;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
  </text>

  <text x="450" y="250" text-anchor="middle" fill="#8b949e" font-size="11">Every thread runs the same formula — only blockIdx.x and threadIdx.x differ, giving each one a unique global index.</text>
</svg>
