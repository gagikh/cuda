<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="380" fill="#0d1117"/>
  <text x="450" y="34" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="bold">Grid → Blocks → Threads</text>

  <!-- Grid outer -->
  <rect x="40" y="60" width="820" height="290" rx="10" fill="#161b22" stroke="#8957e5" stroke-width="2"/>
  <text x="70" y="85" fill="#8957e5" font-size="14" font-weight="bold">GRID  (gridDim.x × gridDim.y blocks)</text>

  <!-- 3 blocks -->
  <g>
    <rect x="70" y="105" width="230" height="220" rx="8" fill="#0d1117" stroke="#1f6feb" stroke-width="2"/>
    <text x="185" y="125" text-anchor="middle" fill="#1f6feb" font-size="13" font-weight="bold">Block (0,0)</text>
    <g fill="#f0883e" opacity="0.9">
      <rect x="90" y="140" width="28" height="28" rx="4"/><rect x="124" y="140" width="28" height="28" rx="4"/><rect x="158" y="140" width="28" height="28" rx="4"/><rect x="192" y="140" width="28" height="28" rx="4"/><rect x="226" y="140" width="28" height="28" rx="4"/>
      <rect x="90" y="174" width="28" height="28" rx="4"/><rect x="124" y="174" width="28" height="28" rx="4"/><rect x="158" y="174" width="28" height="28" rx="4"/><rect x="192" y="174" width="28" height="28" rx="4"/><rect x="226" y="174" width="28" height="28" rx="4"/>
      <rect x="90" y="208" width="28" height="28" rx="4"/><rect x="124" y="208" width="28" height="28" rx="4"/><rect x="158" y="208" width="28" height="28" rx="4"/><rect x="192" y="208" width="28" height="28" rx="4"/><rect x="226" y="208" width="28" height="28" rx="4"/>
    </g>
    <text x="185" y="270" text-anchor="middle" fill="#8b949e" font-size="11">threadIdx.(x,y) within block</text>
    <text x="185" y="288" text-anchor="middle" fill="#8b949e" font-size="11">blockDim = (5, 3)</text>
    <text x="185" y="308" text-anchor="middle" fill="#e6edf3" font-size="11">blockIdx = (0, 0)</text>
  </g>

  <g>
    <rect x="335" y="105" width="230" height="220" rx="8" fill="#0d1117" stroke="#1f6feb" stroke-width="2"/>
    <text x="450" y="125" text-anchor="middle" fill="#1f6feb" font-size="13" font-weight="bold">Block (1,0)</text>
    <g fill="#f0883e" opacity="0.9">
      <rect x="355" y="140" width="28" height="28" rx="4"/><rect x="389" y="140" width="28" height="28" rx="4"/><rect x="423" y="140" width="28" height="28" rx="4"/><rect x="457" y="140" width="28" height="28" rx="4"/><rect x="491" y="140" width="28" height="28" rx="4"/>
      <rect x="355" y="174" width="28" height="28" rx="4"/><rect x="389" y="174" width="28" height="28" rx="4"/><rect x="423" y="174" width="28" height="28" rx="4"/><rect x="457" y="174" width="28" height="28" rx="4"/><rect x="491" y="174" width="28" height="28" rx="4"/>
      <rect x="355" y="208" width="28" height="28" rx="4"/><rect x="389" y="208" width="28" height="28" rx="4"/><rect x="423" y="208" width="28" height="28" rx="4"/><rect x="457" y="208" width="28" height="28" rx="4"/><rect x="491" y="208" width="28" height="28" rx="4"/>
    </g>
    <text x="450" y="308" text-anchor="middle" fill="#e6edf3" font-size="11">blockIdx = (1, 0)</text>
  </g>

  <g>
    <rect x="600" y="105" width="230" height="220" rx="8" fill="#0d1117" stroke="#1f6feb" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="715" y="200" text-anchor="middle" fill="#8b949e" font-size="14">... more blocks ...</text>
    <text x="715" y="308" text-anchor="middle" fill="#e6edf3" font-size="11">blockIdx = (2, 0)</text>
  </g>

  <text x="450" y="360" text-anchor="middle" fill="#8b949e" font-size="12">Global index = blockIdx.x * blockDim.x + threadIdx.x  (the formula this day's kernels are built around)</text>
</svg>
